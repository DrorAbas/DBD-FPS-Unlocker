name: Unpack release source

on:
  push:
    branches: [main]
    paths:
      - '.release-parts/**'
      - '.github/workflows/unpack-release.yml'
  pull_request:
    branches: [main]
    paths:
      - '.release-parts/**'
      - '.github/workflows/unpack-release.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unpack:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
      - name: Rebuild release and source
        shell: pwsh
        run: |
          $diagnostic = New-Object System.Collections.Generic.List[string]
          $diagnostic.Add("Branch: $env:GITHUB_HEAD_REF")
          $diagnostic.Add("Commit: $env:GITHUB_SHA")
          try {
            if (-not (Test-Path '.release-parts')) {
              throw 'The .release-parts directory is missing.'
            }
            $parts = @(Get-ChildItem '.release-parts\chunk_*.b64' | Sort-Object Name)
            $diagnostic.Add("Chunk count: $($parts.Count)")
            $diagnostic.Add("Chunk names: $($parts.Name -join ', ')")
            $chunkLengths = foreach ($part in $parts) {
              $chunkText = (Get-Content $part.FullName -Raw) -replace '\s',''
              "$($part.Name)=$($chunkText.Length)"
            }
            $diagnostic.Add("Chunk lengths: $($chunkLengths -join ', ')")
            if ($parts.Count -ne 27) {
              throw "Expected 27 release chunks, found $($parts.Count)."
            }
            $b64 = ($parts | ForEach-Object { Get-Content $_.FullName -Raw }) -join ''
            $b64 = $b64 -replace '\s',''
            $diagnostic.Add("Base64 length: $($b64.Length)")
            New-Item -ItemType Directory -Force -Path dist | Out-Null
            $zipPath = 'dist\DBD-FPS-Unlocker-v1.0.0.zip'
            [IO.File]::WriteAllBytes($zipPath,[Convert]::FromBase64String($b64))
            $actualHash = (Get-FileHash $zipPath -Algorithm SHA256).Hash.ToLowerInvariant()
            $expectedHash = '5851b5be7ea4924af10b66b21d6bbc562a4de60548930117dcebf6cb711b70d0'
            $diagnostic.Add("ZIP bytes: $((Get-Item $zipPath).Length)")
            $diagnostic.Add("Expected SHA256: $expectedHash")
            $diagnostic.Add("Actual SHA256: $actualHash")
            if ($actualHash -ne $expectedHash) {
              throw "Release hash mismatch. Expected $expectedHash, got $actualHash."
            }
            Remove-Item '.unpack' -Recurse -Force -ErrorAction SilentlyContinue
            Expand-Archive $zipPath '.unpack' -Force
            Copy-Item '.unpack\DBD_FPS_Unlocker.ps1' . -Force
            Copy-Item '.unpack\DBD_FPS_Unlocker.xaml' . -Force
            Copy-Item '.unpack\DBD_FPS_Unlocker_Diagnostic.cmd' . -Force
            Copy-Item '.unpack\Start_DBD_FPS_Unlocker.cmd' . -Force
            Remove-Item '.unpack' -Recurse -Force
            Remove-Item '.release-parts' -Recurse -Force
            $diagnostic.Add('Result: success')
          }
          catch {
            $diagnostic.Add("Result: failure")
            $diagnostic.Add("Error: $($_.Exception.Message)")
          }
          $diagnostic | Set-Content 'RELEASE_RECONSTRUCTION_DIAGNOSTIC.txt' -Encoding UTF8
      - name: Commit generated files or diagnostics
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if (git diff --cached --quiet) { exit 0 }
          git commit -m "Reconstruct release package and application source"
          if ($env:GITHUB_HEAD_REF) {
            git push origin HEAD:$env:GITHUB_HEAD_REF
          } else {
            git push
          }
