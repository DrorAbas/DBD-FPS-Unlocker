name: Unpack release source

on:
  push:
    branches: [main]
    paths:
      - '.release-parts/**'
      - '.github/workflows/unpack-release.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unpack:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Rebuild release and source
        shell: pwsh
        run: |
          if (-not (Test-Path '.release-parts')) {
            Write-Host 'No release parts found.'
            exit 0
          }
          $parts = Get-ChildItem '.release-parts\part_*.b64' | Sort-Object Name
          if ($parts.Count -eq 0) { exit 0 }
          $b64 = ($parts | ForEach-Object { Get-Content $_.FullName -Raw }) -join ''
          $b64 = $b64 -replace '\s',''
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          [IO.File]::WriteAllBytes('dist\DBD-FPS-Unlocker-v1.0.0.zip',[Convert]::FromBase64String($b64))
          Remove-Item '.unpack' -Recurse -Force -ErrorAction SilentlyContinue
          Expand-Archive 'dist\DBD-FPS-Unlocker-v1.0.0.zip' '.unpack' -Force
          Copy-Item '.unpack\DBD_FPS_Unlocker.ps1' . -Force
          Copy-Item '.unpack\DBD_FPS_Unlocker.xaml' . -Force
          Copy-Item '.unpack\DBD_FPS_Unlocker_Diagnostic.cmd' . -Force
          Copy-Item '.unpack\Start_DBD_FPS_Unlocker.cmd' . -Force
          Remove-Item '.unpack' -Recurse -Force
          Remove-Item '.release-parts' -Recurse -Force
      - name: Commit generated release files
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if (git diff --cached --quiet) { exit 0 }
          git commit -m "Add release package and application source"
          git push
