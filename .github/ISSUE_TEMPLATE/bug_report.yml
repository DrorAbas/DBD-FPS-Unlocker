name: Bug report
description: Report a reproducible problem
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Do not include passwords, tokens or private personal information.
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: 1.0.0
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: DBD platform
      options:
        - Steam
        - Epic Games Store
        - Microsoft Store
        - Other
    validations:
      required: true
  - type: input
    id: windows
    attributes:
      label: Windows version
      placeholder: Windows 11 24H2
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      placeholder: |
        1. Close DBD
        2. Select...
        3. Click...
    validations:
      required: true
  - type: textarea
    id: log
    attributes:
      label: Diagnostic output or activity log
      render: text
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: DBD was closed while applying or restoring.
          required: true
        - label: I tested the latest release.
          required: true
